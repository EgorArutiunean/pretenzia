name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Compile modules
        run: |
          python -m py_compile \
            app/config.py \
            app/main.py \
            app/pipeline.py \
            app/bot/__main__.py \
            app/bot/handlers.py \
            app/bot/keyboards.py \
            app/modules/claims/generate_claims_from_registry.py \
            app/modules/excel_normalizer/build_debt_registry_template.py \
            app/shared/money_to_words.py \
            app/shared/file_utils.py \
            app/shared/zip_utils.py \
            app/maintenance/cleanup_storage.py

      - name: Run tests
        run: python -m unittest discover -v

      - name: Build Docker image
        run: docker build -t pretenzia:ci .
